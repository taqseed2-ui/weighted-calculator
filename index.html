<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حاسبة النسبة الموزونة</title>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:Tahoma,Arial,sans-serif;
}
body{
    background:#eef3f8;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}
.card{
    width:100%;
    max-width:500px;
    background:#fff;
    border-radius:20px;
    padding:30px;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
}
h1{
    text-align:center;
    color:#1565c0;
    margin-bottom:25px;
}
label{
    display:block;
    margin:15px 0 8px;
    font-weight:bold;
    color:#333;
}
input{
    width:100%;
    padding:14px;
    border:1px solid #ccc;
    border-radius:10px;
    font-size:17px;
}
input:focus{
    outline:none;
    border-color:#1565c0;
}
button{
    width:100%;
    padding:15px;
    margin-top:25px;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}
#calc{
    background:#1565c0;
    color:white;
}
#calc:hover{
    background:#0d47a1;
}
#clear{
    margin-top:10px;
    background:#f44336;
    color:white;
}
#clear:hover{
    background:#c62828;
}
.result{
    margin-top:25px;
    background:#e3f2fd;
    padding:20px;
    border-radius:12px;
    text-align:center;
}
.result h2{
    color:#1565c0;
    margin-bottom:10px;
}
#answer{
    font-size:40px;
    color:#0d47a1;
    font-weight:bold;
}
.footer{
    text-align:center;
    margin-top:20px;
    color:#666;
}
</style>

</head>
<body>

<div class="card">

<h1>حاسبة النسبة الموزونة</h1>

<label>درجة الثانوية</label>
<input id="school" type="number" min="0" max="100" placeholder="مثال: 98">

<label>درجة القدرات</label>
<input id="qudrat" type="number" min="0" max="100" placeholder="مثال: 85">

<label>درجة التحصيلي</label>
<input id="tahsili" type="number" min="0" max="100" placeholder="مثال: 90">

<button id="calc" onclick="calculate()">احسب النسبة</button>

<button id="clear" onclick="resetForm()">إعادة تعيين</button>

<div class="result">
<h2>النسبة الموزونة</h2>
<div id="answer">--</div>
</div>

<div class="footer">
30٪ ثانوي + 30٪ قدرات + 40٪ تحصيلي
</div>

</div>

<script>
function calculate(){

let school=parseFloat(document.getElementById("school").value);
let qudrat=parseFloat(document.getElementById("qudrat").value);
let tahsili=parseFloat(document.getElementById("tahsili").value);

if(isNaN(school)||isNaN(qudrat)||isNaN(tahsili)){
alert("يرجى إدخال جميع الدرجات");
return;
}

if(school<0||school>100||qudrat<0||qudrat>100||tahsili<0||tahsili>100){
alert("يجب أن تكون جميع الدرجات بين 0 و100");
return;
}

let result=(school*0.30)+(qudrat*0.30)+(tahsili*0.40);

document.getElementById("answer").innerHTML=result.toFixed(2)+"%";
}

function resetForm(){

document.getElementById("school").value="";
document.getElementById("qudrat").value="";
document.getElementById("tahsili").value="";
document.getElementById("answer").innerHTML="--";

}
</script>

</body>
</html>
