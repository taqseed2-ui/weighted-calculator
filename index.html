<!DOCTYPE html><html lang="ar" dir="rtl"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>حاسبة النسبة الموزونة</title><body><h2>حاسبة النسبة الموزونة</h2><input id=a placeholder="الثانوية"><input id=b placeholder="القدرات"><input id=c placeholder="التحصيلي"><button onclick="calc()">احسب</button><div id=r></div><script>function calc(){let a=+document.getElementById('a').value,b=+document.getElementById('b').value,c=+document.getElementById('c').value;document.getElementById('r').innerHTML='النسبة: '+((a*.3)+(b*.3)+(c*.4)).toFixed(2)+'%';}</script></body></html>
