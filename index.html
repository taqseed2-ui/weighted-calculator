<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>حاسبة الجامعات السعودية</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
background:#eef4fb;
padding:25px;
}

.container{
max-width:700px;
margin:auto;
background:#fff;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.15);
}

h1{
text-align:center;
color:#005bbb;
margin-bottom:25px;
}

label{
display:block;
margin-top:15px;
margin-bottom:8px;
font-weight:bold;
}

select,input{
width:100%;
padding:14px;
border:1px solid #ccc;
border-radius:10px;
font-size:18px;
}

button{
width:100%;
padding:16px;
margin-top:25px;
background:#005bbb;
color:#fff;
border:none;
border-radius:10px;
font-size:20px;
cursor:pointer;
}

button:hover{
background:#004899;
}

.result{
margin-top:30px;
background:#e8f3ff;
padding:25px;
border-radius:15px;
text-align:center;
font-size:28px;
font-weight:bold;
color:#005bbb;
}

.info{
margin-top:15px;
text-align:center;
font-size:18px;
color:#444;
}
</style>

</head>

<body>

<div class="container">

<h1>حاسبة الجامعات السعودية</h1>

<label>اختر الجامعة</label>

<select id="uni">

<option>جامعة الملك سعود</option>
<option>جامعة الملك عبدالعزيز</option>
<option>جامعة الإمام عبدالرحمن بن فيصل</option>
<option>جامعة أم القرى</option>
<option>جامعة طيبة</option>
<option>جامعة القصيم</option>
<option>جامعة الملك خالد</option>
<option>جامعة تبوك</option>
<option>جامعة الجوف</option>
<option>جامعة حائل</option>
<option>جامعة نجران</option>
<option>جامعة جازان</option>
<option>جامعة الباحة</option>
<option>جامعة الحدود الشمالية</option>
<option>جامعة شقراء</option>
<option>جامعة المجمعة</option>
<option>جامعة بيشة</option>
<option>جامعة الأمير سطام</option>
<option>جامعة جدة</option>

</select>

<label>درجة الثانوية</label>
<input type="number" id="school">

<label>درجة القدرات</label>
<input type="number" id="qudrat">

<label>درجة التحصيلي</label>
<input type="number" id="tahsili">

<button onclick="calc()">
احسب النسبة الموزونة
</button>

<div class="result" id="result">
--
</div>

<div class="info" id="info"></div>

</div>

<script>

function calc(){

let s=parseFloat(document.getElementById("school").value)||0;
let q=parseFloat(document.getElementById("qudrat").value)||0;
let t=parseFloat(document.getElementById("tahsili").value)||0;

let total=(s*0.30)+(q*0.30)+(t*0.40);

document.getElementById("result").innerHTML=
total.toFixed(2)+" %";

document.getElementById("info").innerHTML=
"الجامعة المختارة : "+document.getElementById("uni").value;

}

</script>

</body>
</html>
